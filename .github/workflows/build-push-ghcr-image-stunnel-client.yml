name: Build And Push GHCR Image Stunnel Client

on:
  workflow_call:
    inputs:
      image_tag:
        description: Optional image tag. Defaults to the current commit SHA.
        required: false
        type: string
      push_latest:
        description: Also publish the `latest` tag.
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag. Defaults to the current commit SHA.
        required: false
        type: string
      push_latest:
        description: Also publish the `latest` tag.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: build-push-ghcr-image-stunnel-client-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: x-evor/images/stunnel-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@21162887f0d6e25b4e8eafb0cf44cf9bf7f6acd3

      - name: Log In To GHCR
        uses: docker/login-action@bb555fc48dca4deb5f227b07c7304c673b5708f0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Compute Image Tags
        id: meta
        uses: docker/metadata-action@c3b064c6d7c32446d6bc214ea075f1caad2de35a
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
            type=sha,format=short,enable=${{ inputs.image_tag == '' }}
            type=raw,value=latest,enable=${{ inputs.push_latest }}

      - name: Build And Push Image
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: deploy/base-images
          file: deploy/base-images/stunnel.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
